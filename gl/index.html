<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Gesture Lab - Fun experiments with movement tracking"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate icon" href="/favicon.ico">

    <!-- Preconnect to CDN for faster loading -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://storage.googleapis.com" crossorigin />

    <title>Gesture Lab</title>

    <style>
      /* Critical CSS for initial load */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
      }

      #app {
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
      }

      .initial-loading {
        text-align: center;
      }

      .initial-loading h1 {
        font-size: 24px;
        font-weight: 300;
        letter-spacing: 2px;
        margin-bottom: 20px;
        background: linear-gradient(135deg, #ffa575 0%, #311599 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #ffa575;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Back to home button */
      .back-home {
        position: fixed;
        bottom: 18px;
        left: 18px;
        z-index: 12000;
      }

      .back-home a {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 9px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 0.08em;
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      .back-home a:hover {
        background: rgba(0, 0, 0, 0.65);
        border-color: rgba(255, 255, 255, 0.4);
      }

      @media (max-width: 768px) {
        .back-home { bottom: 14px; left: 14px; }
        .back-home a { padding: 8px 12px; font-size: 11px; letter-spacing: 0.05em; }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-B0xHLoaL.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/three-BW3oarc1.js">
    <link rel="modulepreload" crossorigin href="./assets/mediapipe-BJQlj0xU.js">
    <link rel="stylesheet" crossorigin href="./assets/index-YfXo-qrH.css">
  </head>
  <body>
    <div class="back-home"><a href="/">← TOP</a></div>
    <div id="app">
      <!-- Initial loading state (replaced by JS) -->
      <div class="initial-loading">
        <h1>✦ Gesture Lab ✦</h1>
        <div class="spinner"></div>
        <p style="margin-top: 20px; opacity: 0.6; font-size: 14px">
          Loading...
        </p>
      </div>
    </div>

    <!-- Main application script -->
  </body>
</html>
