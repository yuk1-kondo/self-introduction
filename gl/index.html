<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Gesture Lab - Fun experiments with movement tracking"
    />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Preconnect to CDN for faster loading -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://storage.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <title>Gesture Lab</title>

    <style>
      /* Critical CSS for initial load - YUKKND Design */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        font-family: 'Space Grotesk', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      #app {
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
      }

      .initial-loading {
        text-align: center;
      }

      .initial-loading h1 {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.5px;
        margin-bottom: 24px;
        color: #fff;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #222;
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <script type="module" crossorigin src="./assets/index-C0xb1v7n.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/three-BW3oarc1.js">
    <link rel="modulepreload" crossorigin href="./assets/mediapipe-BJQlj0xU.js">
    <link rel="stylesheet" crossorigin href="./assets/index-u--64ozy.css">
    <style>
      /* Back Home Button - YUKKND Style */
      .back-home {
        position: fixed;
        bottom: 18px;
        left: 18px;
        z-index: 12000;
      }
      .back-home a {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 9px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        text-decoration: none;
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 12px;
        letter-spacing: 0.08em;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        transition: all 0.15s ease;
      }
      .back-home a:hover {
        background: rgba(0, 0, 0, 0.65);
        border-color: rgba(255, 255, 255, 0.4);
      }
      @media (max-width: 768px) {
        .back-home { bottom: 14px; left: 14px; }
        .back-home a { padding: 8px 12px; font-size: 11px; letter-spacing: 0.05em; }
      }
    </style>
  </head>
  <body>
    <div class="back-home"><a href="/">← TOP</a></div>
    <div id="app">
      <!-- Initial loading state (replaced by JS) -->
      <div class="initial-loading">
        <h1>GESTURE LAB</h1>
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: #666; font-size: 13px">
          Loading...
        </p>
      </div>
    </div>
